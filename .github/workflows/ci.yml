name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # First-time GHCR publish under the org requires a one-time org setting to
  # permit Actions to create the package. Until that is enabled, this job is
  # best-effort and allowed to fail; the test job is the real gate.
  image:
    needs: test
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/lineofflight/frankfurter-mcp:latest
            ghcr.io/lineofflight/frankfurter-mcp:${{ github.sha }}
